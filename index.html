<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signal — Feature Requests</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Karla:wght@200;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
</head>

<body>

    <nav>
        <h3>📡 Signal</h3>
        <p class="nav-tagline">Tell us what to build next</p>
    </nav>
    
    <!-- Form: same IDs as original so JS stays untouched -->
    <form id="new-post">
        <label for="post-title">What should we build?</label>
        <input id="post-title" type="text" placeholder="e.g. Dark mode, CSV export..." />
    
        <label for="post-body">Why does this matter to you?</label>
        <textarea id="post-body" placeholder="Describe the problem it would solve..."></textarea>
    
        <button>Submit Idea</button>
    </form>
